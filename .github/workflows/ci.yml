name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Swift package verification
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build package
        run: swift build

      - name: Run XCTest suite
        run: swift test

      - name: Run verification harness
        run: swift run VUACheck

      - name: Build app bundle
        run: ./Scripts/make_app.sh
